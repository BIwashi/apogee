version: 2
project_name: apogee

before:
  hooks:
    - go mod tidy
    - sh -c "cd web && npm ci && npm run build"
    - sh -c "mkdir -p internal/webassets/dist && rsync -a --delete web/out/ internal/webassets/dist/"

builds:
  - id: apogee
    main: ./cmd/apogee
    binary: apogee
    env:
      - CGO_ENABLED=1
    # v0.1.0 is darwin-only. Linux cgo cross-compile of the DuckDB
    # static lib collides with libstdc++ symbols under zig cc; a
    # proper GCC cross toolchain (or a native ubuntu matrix runner)
    # lands in v0.2.0.
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/BIwashi/apogee/internal/version.Version={{.Version}}
      - -X github.com/BIwashi/apogee/internal/version.Commit={{.ShortCommit}}
      - -X github.com/BIwashi/apogee/internal/version.BuildDate={{.Date}}
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CC=clang -arch x86_64
          - CXX=clang++ -arch x86_64

  # Second build: the Wails-backed desktop shell. Lives in ./desktop as a
  # standalone `package main` with a //go:build darwin guard (see
  # desktop/main.go) and a stub for other platforms so `go build ./...`
  # stays green on linux CI. Shipped as a universal (arm64+amd64) .app
  # bundle via the post-hook below.
  - id: apogee-desktop
    main: ./desktop
    binary: apogee-desktop
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    # -tags production is mandatory for Wails v2: without it the
    # runtime refuses to bring up the WKWebView and every launch fails
    # with "Wails applications will not build without the correct build
    # tags." The `wails build` CLI sets this automatically; we plumb it
    # manually because this build does not go through the CLI.
    tags:
      - production
    ldflags:
      - -s -w
      - -X github.com/BIwashi/apogee/internal/version.Version={{.Version}}
      - -X github.com/BIwashi/apogee/internal/version.Commit={{.ShortCommit}}
      - -X github.com/BIwashi/apogee/internal/version.BuildDate={{.Date}}
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CC=clang -arch x86_64
          - CXX=clang++ -arch x86_64

# Fuse the two desktop arch slices into a single universal Mach-O and
# wrap it in an .app bundle. The post hook writes Apogee.app next to the
# fused binary so the archives[] entry below can pick it up as a tree.
# The .app is NOT code-signed or notarized — the homebrew cask below
# strips the com.apple.quarantine xattr on install so Gatekeeper does
# not block first launch.
universal_binaries:
  - id: apogee-desktop-universal
    ids:
      - apogee-desktop
    replace: true
    name_template: apogee-desktop
    hooks:
      post:
        - cmd: bash scripts/bundle-desktop-app.sh "{{ .Path }}" "{{ .Version }}"
          output: true

archives:
  - id: apogee
    ids:
      - apogee
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

  # The desktop .app is packaged as a meta zip — goreleaser does not put
  # the raw Mach-O at the archive root, only the Apogee.app tree we
  # assembled under dist/apogee-desktop_darwin_all/. strip_parent keeps
  # the zip layout at `Apogee.app/Contents/...` instead of nesting it
  # under the dist path.
  - id: apogee-desktop
    ids:
      - apogee-desktop-universal
    formats: [zip]
    name_template: apogee-desktop_{{ .Version }}_darwin_universal
    files:
      - src: dist/apogee-desktop-universal_darwin_all/Apogee.app
        dst: Apogee.app

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: BIwashi
    name: apogee
  draft: false
  prerelease: auto
  header: |
    apogee {{ .Tag }} — Claude Code multi-agent observability.

    Install via Homebrew:

    ```
    brew install BIwashi/tap/apogee
    apogee serve &
    apogee init --source-app my-project
    ```

    Or via `go install`:

    ```
    go install github.com/BIwashi/apogee/cmd/apogee@{{ .Tag }}
    ```

brews:
  - name: apogee
    ids:
      - apogee
    repository:
      owner: BIwashi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: apogee-release-bot
      email: 49979368+BIwashi@users.noreply.github.com
    commit_msg_template: "brew: release apogee {{ .Tag }}"
    homepage: "https://github.com/BIwashi/apogee"
    description: "Multi-agent observability dashboard for Claude Code."
    license: "Apache-2.0"
    install: |
      bin.install "apogee"
    test: |
      assert_match "apogee v", shell_output("#{bin}/apogee version")

# The desktop .app ships as a Cask in the same tap so a single
# `brew tap BIwashi/tap && brew install --cask apogee-desktop` gets
# users a native macOS window. It is intentionally a separate artifact
# from the `apogee` formula above — the formula installs the CLI
# binary at /opt/homebrew/bin/apogee, the cask places Apogee.app into
# /Applications.
#
# apogee is not code-signed or notarized, so brew must strip the
# com.apple.quarantine xattr at install time. Gatekeeper on macOS 15+
# no longer offers a right-click → Open workaround, so without the
# post hook users would have to clear the flag manually.
homebrew_casks:
  - name: apogee-desktop
    ids:
      - apogee-desktop
    repository:
      owner: BIwashi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    commit_author:
      name: apogee-release-bot
      email: 49979368+BIwashi@users.noreply.github.com
    commit_msg_template: "brew: release apogee-desktop cask {{ .Tag }}"
    homepage: "https://github.com/BIwashi/apogee"
    description: "Native macOS window for the apogee multi-agent observability dashboard."
    # The desktop shell runs `apogee onboard --yes` on first launch
    # when no daemon is reachable, so the `apogee` CLI formula MUST be
    # on PATH. Declaring it as a dependency means `brew install --cask
    # apogee-desktop` pulls in the formula automatically and the
    # first-run bootstrap flow always has `apogee` available.
    dependencies:
      - formula: BIwashi/tap/apogee
    # goreleaser auto-generates a `binary "apogee-desktop"` directive
    # from the tiny launcher shim that replaces the raw Mach-O in the
    # zip (see scripts/bundle-desktop-app.sh). The custom_block below
    # layers the real `app "Apogee.app"` directive on top so brew
    # actually installs the bundle into /Applications, and wires an
    # uninstall_preflight that tears down the daemon ONLY when it was
    # installed by the desktop shell's first-run bootstrap (marker
    # file at ~/.apogee/installed-by-desktop).
    custom_block: |
      app "Apogee.app"

      uninstall_preflight do
        # Quit any running Apogee.app before we remove the bundle so
        # /Applications/Apogee.app is not held open by WindowServer.
        system_command "/usr/bin/osascript",
                       args: ["-e", 'tell application id "dev.apogee.desktop" to quit'],
                       sudo: false,
                       must_succeed: false

        # If the desktop shell bootstrapped the daemon on first launch,
        # tear it down here. We only `bootout` (stop it) and leave the
        # plist on disk — `brew upgrade --cask apogee-desktop` does an
        # uninstall+install pair under the hood, and deleting the plist
        # every upgrade would trigger a spurious re-onboard on the next
        # launch. Full plist removal is reserved for `brew uninstall
        # --zap --cask apogee-desktop`, which takes the `zap trash:`
        # path below.
        marker = File.expand_path("~/.apogee/installed-by-desktop")
        if File.exist?(marker)
          system_command "/bin/launchctl",
                         args: ["bootout", "gui/#{Process.uid}/dev.biwashi.apogee"],
                         sudo: false,
                         must_succeed: false
        end
      end
    # Stop the running .app and the running launchd job via cask's
    # native directives too — they run before custom_block's preflight
    # and give brew clean lifecycle breadcrumbs.
    uninstall:
      quit:
        - dev.apogee.desktop
      launchctl:
        - dev.biwashi.apogee
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/Apogee.app"]
    # `brew uninstall --zap --cask apogee-desktop` removes everything
    # the desktop shell can touch: the LaunchAgents plist, the full
    # ~/.apogee data directory (DuckDB store + logs + config), and
    # miscellaneous macOS framework caches. Reserved for the `--zap`
    # flag so plain uninstalls (including the upgrade uninstall+install
    # pair) do not accidentally delete the user's observability
    # history.
    zap:
      trash:
        - "~/.apogee"
        - "~/Library/LaunchAgents/dev.biwashi.apogee.plist"
        - "~/Library/Application Support/apogee-desktop"
        - "~/Library/Caches/dev.apogee.desktop"
        - "~/Library/Preferences/dev.apogee.desktop.plist"
